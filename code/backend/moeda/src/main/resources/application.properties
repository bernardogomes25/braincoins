spring.application.name=moeda
spring.config.import=optional:file:./env.properties

# Porta (Render injeta PORT automaticamente)
server.port=${PORT:8080}

# Conexao com o PostgreSQL
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/braincoins}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:admin2513}
spring.datasource.driver-class-name=org.postgresql.Driver

#Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update

# Upload de arquivos
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB

# Configuração de E-mail (Resend HTTP API — não usa SMTP)
mail.api.key=${MAIL_PASSWORD:}
app.mail.from=${MAIL_FROM:noreply@braincoins.io}

